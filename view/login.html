<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - SmartBook</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="admin-page relative min-h-screen overflow-hidden">

  <!-- Blurred background -->
  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat blur-sm scale-105"
       style="background-image: url('images/background.png');"></div>
  <div class="absolute inset-0 bg-black/40"></div>

  <!-- Card -->
  <div class="relative min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-3xl bg-white/85 backdrop-blur-xl shadow-2xl border border-white/40 p-8">

      <!-- Logo -->
      <div class="flex justify-center mb-4">
        <img src="images/logo.png" alt="SmartBook Logo" class="h-16 w-auto max-w-[180px] object-contain" />
      </div>

      <!-- ─── STEP 1: Login ─────────────────────────────────────────────────── -->
      <div id="loginStep">
        <h1 class="text-center text-3xl font-black text-slate-900">Admin Login</h1>
        <p class="text-center text-sm font-semibold text-slate-500 mt-2 mb-6">
          Smart<span class="text-indigo-600">Book</span>
        </p>

        <div id="loginMsg" class="notice mb-4" style="display:none;"></div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Username</label>
            <input type="text" id="username" placeholder="Enter admin username" required
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Password</label>
            <input type="password" id="password" placeholder="Enter password" required
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <button type="submit"
            class="w-full rounded-2xl bg-indigo-600 py-4 font-black text-white shadow-xl transition hover:bg-indigo-700">
            Login
          </button>
        </form>

        <div class="mt-5 text-center">
          <button onclick="showStep('forgotStep')"
            class="text-sm font-bold text-indigo-600 hover:text-indigo-800 hover:underline transition">
            Forgot password?
          </button>
        </div>
      </div>

      <!-- ─── STEP 2: Forgot password ───────────────────────────────────────── -->
      <div id="forgotStep" class="hidden">
        <button onclick="showStep('loginStep')"
          class="mb-5 flex items-center gap-1.5 text-sm font-bold text-slate-500 hover:text-slate-800 transition">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          Back to Login
        </button>

        <h1 class="text-2xl font-black text-slate-900">Reset Password</h1>
        <p class="text-sm font-semibold text-slate-500 mt-1 mb-6">
          Enter your username and the email registered to your account.
          A reset link will be sent if they match.
        </p>

        <div id="forgotMsg" class="mb-4 hidden rounded-xl px-4 py-3 font-bold text-sm"></div>

        <form id="forgotForm" class="space-y-4">
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Username</label>
            <input type="text" id="forgotUsername" placeholder="Your admin username" required
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Email Address</label>
            <input type="email" id="forgotEmail" placeholder="Email on your admin account" required
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <button type="submit" id="forgotBtn"
            class="w-full rounded-2xl bg-indigo-600 py-4 font-black text-white shadow-xl transition hover:bg-indigo-700">
            Send Reset Link
          </button>
        </form>
      </div>

      <!-- ─── STEP 3: Reset password ─────────────────────────────────────────── -->
      <div id="resetStep" class="hidden">
        <h1 class="text-2xl font-black text-slate-900">Set New Password</h1>
        <p class="text-sm font-semibold text-slate-500 mt-1 mb-6">
          Choose a strong password for your admin account.
        </p>

        <div id="resetMsg" class="mb-4 hidden rounded-xl px-4 py-3 font-bold text-sm"></div>

        <form id="resetForm" class="space-y-4">
          <input type="hidden" id="resetToken" />
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">New Password</label>
            <input type="password" id="resetPassword" placeholder="At least 6 characters" required minlength="6"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Confirm Password</label>
            <input type="password" id="resetConfirm" placeholder="Re-enter new password" required minlength="6"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <button type="submit" id="resetBtn"
            class="w-full rounded-2xl bg-indigo-600 py-4 font-black text-white shadow-xl transition hover:bg-indigo-700">
            Set Password
          </button>
        </form>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // ── Step switching ───────────────────────────────────────────────────────
    function showStep(id) {
      ['loginStep', 'forgotStep', 'resetStep'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
      clearMsg('loginMsg');
      clearMsg('forgotMsg');
      clearMsg('resetMsg');
    }

    function showStepMsg(id, text, type) {
      const el = document.getElementById(id);
      el.className = `mb-4 rounded-xl px-4 py-3 font-bold text-sm ${
        type === 'success'
          ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
          : 'bg-red-50 text-red-700 border border-red-200'
      }`;
      el.textContent = text;
      el.classList.remove('hidden');
    }

    function clearMsg(id) {
      const el = document.getElementById(id);
      el.classList.add('hidden');
      el.textContent = '';
    }

    // ── On load: check for ?token= in URL ───────────────────────────────────
    (function init() {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');
      if (token) {
        document.getElementById('resetToken').value = token;
        showStep('resetStep');
        // Clean the token from the address bar without reloading the page
        history.replaceState(null, '', window.location.pathname);
      }
    })();

    // ── Step 1: Login ────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      try {
        await loginAdmin(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value.trim()
        );
        window.location.href = 'dashboard.html';
      } catch (err) {
        showMessage('loginMsg', err.message, 'error');
      }
    });

    // ── Step 2: Forgot password ──────────────────────────────────────────────
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn      = document.getElementById('forgotBtn');
      const username = document.getElementById('forgotUsername').value.trim();
      const email    = document.getElementById('forgotEmail').value.trim();

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      try {
        const res = await forgotPasswordApi(username, email);
        showStepMsg('forgotMsg', res.message, 'success');
        document.getElementById('forgotForm').reset();
      } catch (err) {
        showStepMsg('forgotMsg', err.message, 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Send Reset Link';
      }
    });

    // ── Step 3: Reset password ───────────────────────────────────────────────
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn      = document.getElementById('resetBtn');
      const token    = document.getElementById('resetToken').value.trim();
      const password = document.getElementById('resetPassword').value;
      const confirm  = document.getElementById('resetConfirm').value;

      if (password !== confirm) {
        showStepMsg('resetMsg', 'Passwords do not match.', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Saving…';

      try {
        const res = await resetPasswordApi(token, password);
        showStepMsg('resetMsg', res.message + ' Redirecting to login…', 'success');
        document.getElementById('resetForm').reset();
        setTimeout(() => showStep('loginStep'), 2500);
      } catch (err) {
        showStepMsg('resetMsg', err.message, 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Set Password';
      }
    });
  </script>
</body>
</html>
