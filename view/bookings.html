<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings - SmartBook</title>

  <!-- Browser Tab Logo -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="auth-guard.js"></script>
</head>

<body class="admin-page min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 text-slate-800 antialiased">
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="sticky top-0 flex h-screen w-60 shrink-0 flex-col bg-gradient-to-br from-indigo-950 via-slate-950 to-slate-900 p-5 text-white shadow-2xl">
      <div class="mb-7">
        <div class="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/10 p-3">
          <img
            src="./images/logo.png"
            alt="SmartBook Logo"
            class="h-11 w-11 shrink-0 rounded-xl bg-white p-1.5 object-contain"
            onerror="this.onerror=null;this.src='images/logo.png';"
          />
          <div>
            <div class="text-lg font-black leading-tight text-white">Smart<span class="text-violet-400">Book</span></div>
            <div class="mt-1 text-[11px] font-bold uppercase tracking-wider text-indigo-200">
              Admin Panel
            </div>
          </div>
        </div>
      </div>

      <nav class="space-y-2">
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="dashboard.html">Dashboard</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="rooms.html">Rooms</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="book-room.html">Book Room</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="users.html">Users</a>
        <a class="block rounded-xl bg-indigo-600 px-4 py-3 font-bold text-white shadow-lg" href="bookings.html">Bookings</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="history.html">History</a>
        <a id="adminsNavLink" class="hidden rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="admins.html">Admins</a>
      </nav>

      <div class="mt-auto">
        <div class="my-4 border-t border-white/10"></div>

        <!-- Signed-in admin info -->
        <div class="mb-3 flex items-center gap-2.5 rounded-xl bg-white/5 px-3 py-2.5">
          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-indigo-500/40 text-sm font-black text-white">
            <span id="sidebarAdminInitial">A</span>
          </div>
          <div class="min-w-0 flex-1">
            <div id="sidebarAdminName" class="truncate text-sm font-black text-white">Admin</div>
            <div id="sidebarAdminRole" class="text-[11px] font-bold uppercase tracking-wide text-indigo-300">Loading…</div>
          </div>
        </div>

        <!-- Logout button -->
        <button
          onclick="logout()"
          class="flex w-full items-center justify-center gap-2.5 rounded-xl bg-red-600/15 px-4 py-3 text-sm font-extrabold text-red-400 ring-1 ring-inset ring-red-500/30 transition hover:bg-red-600 hover:text-white hover:ring-red-600"
        >
          <svg class="h-4 w-4 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-8">

      <!-- Header -->
      <div class="mb-6 flex flex-col gap-4 rounded-3xl border border-slate-200 bg-white/80 p-5 shadow-lg backdrop-blur md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-3xl font-black text-slate-900">Booking Management</h1>
        </div>
      </div>

      <div id="bookingMessage" style="display:none;"></div>

      <!-- Filters -->
      <section class="mb-5 rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-600">
              Filter by Room
            </label>
            <select
              id="bookingRoomFilter"
              onchange="renderBookings()"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            >
              <option value="">All rooms</option>
            </select>
          </div>

          <div>
            <label class="mb-2 block text-sm font-bold text-slate-600">
              Filter by Date
            </label>
            <input
              type="date"
              id="bookingDateFilter"
              onchange="renderBookings()"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            />
          </div>
        </div>
      </section>

      <!-- Bookings Table -->
      <section class="rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
        <div class="overflow-x-auto rounded-2xl border border-slate-200">
          <table class="w-full border-collapse bg-white">
            <thead>
              <tr>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Booked By</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Email</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Date</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Time</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Details</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Status</th>
                <th class="bg-slate-50 px-4 py-3 text-right text-xs font-black uppercase tracking-wider text-slate-500">Action</th>
              </tr>
            </thead>
            <tbody id="bookingRows"></tbody>
          </table>
        </div>
      </section>

      <!-- ── Booking Details Modal ──────────────────────────────────────────────── -->
      <div id="bookingDetailsModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/30 backdrop-blur-md p-4">
        <div class="w-full max-w-md rounded-3xl border border-white/60 bg-white/75 p-6 shadow-2xl backdrop-blur-xl">
          <h2 class="mb-4 text-xl font-black text-slate-900">Booking Details</h2>

          <div class="space-y-4">
            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Room</label>
              <p id="detailsRoom" class="font-bold text-slate-800"></p>
            </div>

            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Purpose</label>
              <p id="detailsPurpose" class="font-bold text-slate-800"></p>
            </div>

            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Agenda</label>
              <p id="detailsAgenda" class="whitespace-pre-wrap text-sm font-semibold text-slate-600"></p>
            </div>

            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Participants</label>
              <p id="detailsParticipants" class="text-sm font-semibold text-slate-600"></p>
            </div>
          </div>

          <button
            type="button"
            onclick="closeBookingDetailsModal()"
            class="mt-6 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-600 transition hover:bg-slate-50"
          >
            Close
          </button>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
  <script src="sidebar-extras.js"></script>
  <script>
    requireAuth();

    let allRoomsCache = [];
    let bookingsCache = [];

    function fillBookingRoomFilter(rooms) {
      const select = document.getElementById('bookingRoomFilter');
      const selected = select.value;

      let html = '<option value="">All rooms</option>';

      rooms.forEach(function(room) {
        html += '<option value="' + room.id + '">' +
          escapeHtml(room.name) + ' - ' + escapeHtml(room.location) +
        '</option>';
      });

      select.innerHTML = html;
      select.value = selected;
    }

    function getBookingSortDateTime(booking) {
      const startValue = booking.startTime || formatTime12(booking.start);
      return new Date(booking.date + 'T' + toTime24(startValue));
    }

    async function renderBookings() {
      const results = await Promise.all([getRooms(), getBookings()]);
      allRoomsCache = results[0];

      const allBookings = results[1];
      fillBookingRoomFilter(allRoomsCache);

      const roomFilter = document.getElementById('bookingRoomFilter').value;
      const dateFilter = document.getElementById('bookingDateFilter').value;

      const bookings = allBookings
        .filter(function(booking) {
          const roomOk   = !roomFilter || Number(booking.roomId) === Number(roomFilter);
          const dateOk   = !dateFilter || booking.date === dateFilter;
          // Exclude completed and cancelled — those belong in History
          const statusOk = booking.status !== 'Completed' && booking.status !== 'Cancelled';

          return roomOk && dateOk && statusOk;
        })
        .sort(function(a, b) {
          return getBookingSortDateTime(b) - getBookingSortDateTime(a);
        });

      bookingsCache = bookings;

      document.getElementById('bookingRows').innerHTML = bookings.map(function(booking) {
        const canCancel = booking.status !== 'Cancelled' && booking.status !== 'Completed';

        return `
          <tr class="transition hover:bg-slate-50">
            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.user)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.email)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(formatDateDisplay(booking.date))}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.startTime || formatTime12(booking.start))}
              -
              ${escapeHtml(booking.endTime || formatTime12(booking.end))}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle">
              ${iconButton('eye', `viewBookingDetails(${booking.id})`, 'View room, purpose, agenda, and participants', 'indigo')}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle">
              ${formatStatus(booking.status)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-right">
              <div class="flex flex-wrap items-center justify-end gap-1">
                ${isSuperAdmin() && canCancel ? iconButton('x', `cancelBooking(${booking.id})`, 'Cancel booking', 'red') : ''}
                ${isSuperAdmin()
                    ? iconButton('trash', `hardDelete(${booking.id})`, 'Delete booking permanently', 'slate')
                    : (!canCancel ? '' : '<span class="text-xs font-semibold text-slate-400">View only</span>')
                }
              </div>
            </td>
          </tr>
        `;
      }).join('') || `
        <tr>
          <td colspan="7" class="px-4 py-6 text-center font-semibold text-slate-500">
            No bookings found.
          </td>
        </tr>
      `;
    }

    function viewBookingDetails(id) {
      const booking = bookingsCache.find(function(b) {
        return Number(b.id) === Number(id);
      });

      if (!booking) return;

      document.getElementById('detailsRoom').textContent = booking.roomName +
        (booking.location ? ' — ' + booking.location : '');
      document.getElementById('detailsPurpose').textContent = booking.purpose || '—';
      document.getElementById('detailsAgenda').textContent = booking.agenda || 'No agenda provided.';
      document.getElementById('detailsParticipants').textContent = booking.participants || 'No participants listed.';

      showModal('bookingDetailsModal');
    }

    function closeBookingDetailsModal() {
      hideModal('bookingDetailsModal');
    }

    document.getElementById('bookingDetailsModal').addEventListener('click', function(e) {
      if (e.target === this) closeBookingDetailsModal();
    });

    function cancelBooking(id) {
      confirmAction('The room will be freed up and the booking owner will no longer see this meeting as active.', async function () {
        try {
          await cancelBookingApi(id);
          showMessage('bookingMessage', 'Booking cancelled successfully.');
          await renderBookings();
        } catch (err) {
          showMessage('bookingMessage', err.message, 'error');
        }
      }, { title: 'Cancel This Booking?', confirmLabel: 'Cancel Booking' });
    }

    function hardDelete(id) {
      confirmAction('This booking will be permanently removed from the database. This cannot be undone.', async function () {
        try {
          await deleteBookingApi(id);
          showMessage('bookingMessage', 'Booking deleted successfully.');
          await renderBookings();
        } catch (err) {
          showMessage('bookingMessage', err.message, 'error');
        }
      }, { title: 'Delete Booking Permanently?', confirmLabel: 'Delete' });
    }

    renderBookings().catch(function(err) {
      showMessage('bookingMessage', err.message, 'error');
    });

    setInterval(renderBookings, 10000);
  </script>
</body>
</html>
