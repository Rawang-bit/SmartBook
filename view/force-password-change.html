<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Password - SmartBook</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth-guard.js"></script>
</head>

<body class="admin-page relative min-h-screen overflow-hidden">

  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat blur-sm scale-105"
       style="background-image: url('images/background.png');"></div>
  <div class="absolute inset-0 bg-black/40"></div>

  <div class="relative min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-3xl bg-white/85 backdrop-blur-xl shadow-2xl border border-white/40 p-8">

      <div class="flex justify-center mb-4">
        <img src="images/logo.png" alt="SmartBook Logo" class="h-16 w-auto max-w-[180px] object-contain" />
      </div>

      <h1 class="text-center text-3xl font-black text-slate-900">Set Your Password</h1>
      <p class="text-center text-sm font-semibold text-slate-500 mt-2 mb-6">
        You're signed in with a temporary password. Choose a new one to continue.
      </p>

      <div id="fpcMsg" class="mb-4 hidden rounded-xl px-4 py-3 font-bold text-sm"></div>

      <form id="fpcForm" class="space-y-5">
        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Temporary Password</label>
          <div class="relative pw-wrap">
            <input type="password" id="fpcCurrent" placeholder="The password from your email" required
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 pr-12 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
            <button type="button" tabindex="-1" onclick="togglePw(this)" aria-label="Toggle password visibility"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition">
              <svg class="eye-open h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg class="eye-closed hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">New Password</label>
          <div class="relative pw-wrap">
            <input type="password" id="fpcNew" placeholder="At least 12 characters" required minlength="12"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 pr-12 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
            <button type="button" tabindex="-1" onclick="togglePw(this)" aria-label="Toggle password visibility"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition">
              <svg class="eye-open h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg class="eye-closed hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Confirm New Password</label>
          <div class="relative pw-wrap">
            <input type="password" id="fpcConfirm" placeholder="Re-enter new password" required minlength="12"
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3.5 pr-12 font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
            <button type="button" tabindex="-1" onclick="togglePw(this)" aria-label="Toggle password visibility"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition">
              <svg class="eye-open h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg class="eye-closed hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" id="fpcSubmitBtn"
          class="w-full rounded-2xl bg-indigo-600 py-4 font-black text-white shadow-xl transition hover:bg-indigo-700">
          Set Password &amp; Continue
        </button>
      </form>

      <div class="mt-5 text-center">
        <button onclick="logout()"
          class="text-sm font-bold text-slate-500 hover:text-slate-800 hover:underline transition">
          Sign out instead
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();

    function showFpcMsg(text, type) {
      const el = document.getElementById('fpcMsg');
      el.className = `mb-4 rounded-xl px-4 py-3 font-bold text-sm ${
        type === 'success'
          ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
          : 'bg-red-50 text-red-700 border border-red-200'
      }`;
      el.textContent = text;
      el.classList.remove('hidden');
    }

    document.getElementById('fpcForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('fpcSubmitBtn');
      const current = document.getElementById('fpcCurrent').value;
      const next = document.getElementById('fpcNew').value;
      const confirm = document.getElementById('fpcConfirm').value;

      if (next !== confirm) {
        showFpcMsg('New password and confirmation do not match.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        await changeOwnPasswordApi(current, next);
        showFpcMsg('Password set successfully! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      } catch (err) {
        showFpcMsg(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Set Password & Continue';
      }
    });
  </script>
</body>
</html>
