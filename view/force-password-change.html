<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Password - SmartBook</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="auth-guard.js"></script>
</head>

<body class="admin-page relative min-h-screen overflow-hidden">

  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat blur-sm scale-105"
       style="background-image: url('images/background.png');"></div>
  <div class="absolute inset-0 bg-black/50"></div>

  <div class="relative min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md rounded-3xl bg-white shadow-[0_32px_64px_-12px_rgba(0,0,0,0.35)] overflow-hidden">

      <!-- Top accent bar -->
      <div class="h-1.5 w-full bg-gradient-to-r from-indigo-500 via-violet-500 to-indigo-600"></div>

      <div class="px-10 pt-8 pb-10">

        <div class="flex justify-center mb-6">
          <img src="images/logo.png" alt="SmartBook Logo" class="h-20 w-auto max-w-[200px] object-contain drop-shadow-sm" />
        </div>

        <div class="text-center mb-8">
          <p class="text-sm font-semibold tracking-widest text-slate-400 uppercase mb-1">Admin Portal</p>
          <h1 class="text-4xl font-black tracking-tight">Smart<span class="text-indigo-600">Book</span></h1>
          <p class="mt-2 text-sm text-slate-500 font-medium">You're signed in with a temporary password. Choose a new one to continue.</p>
        </div>

        <div id="fpcMsg" class="mb-4 hidden rounded-xl px-4 py-3 font-bold text-sm"></div>

        <form id="fpcForm" class="space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Temporary Password</label>
            <div class="relative pw-wrap">
              <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              </span>
              <input type="password" id="fpcCurrent" placeholder="The password from your email" required
                class="w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-12 py-3.5 font-semibold text-slate-800 outline-none transition focus:border-indigo-400 focus:bg-white focus:ring-2 focus:ring-indigo-100" />
              <button type="button" tabindex="-1" onclick="togglePw(this)" aria-label="Toggle password visibility"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition">
                <svg class="eye-open h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="eye-closed hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/></svg>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">New Password</label>
            <div class="relative pw-wrap">
              <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              </span>
              <input type="password" id="fpcNew" placeholder="12+ chars: upper, lower, number &amp; symbol" required minlength="12"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-12 py-3.5 font-semibold text-slate-800 outline-none transition focus:border-indigo-400 focus:bg-white focus:ring-2 focus:ring-indigo-100" />
              <button type="button" tabindex="-1" onclick="togglePw(this)" aria-label="Toggle password visibility"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition">
                <svg class="eye-open h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="eye-closed hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/></svg>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Confirm New Password</label>
            <div class="relative pw-wrap">
              <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              </span>
              <input type="password" id="fpcConfirm" placeholder="Re-enter new password" required minlength="12"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 pl-11 pr-12 py-3.5 font-semibold text-slate-800 outline-none transition focus:border-indigo-400 focus:bg-white focus:ring-2 focus:ring-indigo-100" />
              <button type="button" tabindex="-1" onclick="togglePw(this)" aria-label="Toggle password visibility"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 transition">
                <svg class="eye-open h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="eye-closed hidden h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" id="fpcSubmitBtn"
            class="w-full rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 py-3.5 font-black text-white shadow-lg shadow-indigo-200 transition hover:from-indigo-700 hover:to-violet-700 active:scale-[0.98]">
            Set Password &amp; Continue
          </button>
        </form>

        <p class="mt-6 text-center">
          <button onclick="logout()"
            class="text-sm font-bold text-slate-500 hover:text-slate-800 transition">
            Sign out instead
          </button>
        </p>

      </div><!-- /px-10 content wrapper -->
    </div><!-- /card -->
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();

    function showFpcMsg(text, type) {
      const el = document.getElementById('fpcMsg');
      el.className = `mb-4 rounded-xl px-4 py-3 font-bold text-sm ${
        type === 'success'
          ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
          : 'bg-red-50 text-red-700 border border-red-200'
      }`;
      el.textContent = text;
      el.classList.remove('hidden');
    }

    document.getElementById('fpcForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('fpcSubmitBtn');
      const current = document.getElementById('fpcCurrent').value;
      const next = document.getElementById('fpcNew').value;
      const confirm = document.getElementById('fpcConfirm').value;

      if (next !== confirm) {
        showFpcMsg('New password and confirmation do not match.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        await changeOwnPasswordApi(current, next);
        showFpcMsg('Password set successfully! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      } catch (err) {
        showFpcMsg(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Set Password & Continue';
      }
    });
  </script>
</body>
</html>
