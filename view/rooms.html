<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rooms - SmartBook</title>

  <!-- Browser Tab Logo -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth-guard.js"></script>
</head>

<body class="admin-page min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 text-slate-800 antialiased">
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="sticky top-0 flex h-screen w-60 shrink-0 flex-col bg-gradient-to-br from-indigo-950 via-slate-950 to-slate-900 p-5 text-white shadow-2xl">
      <div class="mb-7">
        <div class="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/10 p-3">
          <img
            src="./images/logo.png"
            alt="SmartBook Logo"
            class="h-11 w-11 shrink-0 rounded-xl bg-white p-1.5 object-contain"
            onerror="this.onerror=null;this.src='images/logo.png';"
          />
          <div>
            <div class="text-lg font-black leading-tight text-white">Smart<span class="text-violet-400">Book</span></div>
            <div class="mt-1 text-[11px] font-bold uppercase tracking-wider text-indigo-200">
              Admin Panel
            </div>
          </div>
        </div>
      </div>

      <nav class="space-y-2">
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="dashboard.html">Dashboard</a>
        <a class="block rounded-xl bg-indigo-600 px-4 py-3 font-bold text-white shadow-lg" href="rooms.html">Rooms</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="book-room.html">Book Room</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="users.html">Users</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="bookings.html">Bookings</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="history.html">History</a>
        <a id="adminsNavLink" class="hidden rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="admins.html">Admins</a>
      </nav>

      <div class="mt-auto">
        <div class="my-4 border-t border-white/10"></div>

        <!-- Signed-in admin info -->
        <div class="mb-3 flex items-center gap-2.5 rounded-xl bg-white/5 px-3 py-2.5">
          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-indigo-500/40 text-sm font-black text-white">
            <span id="sidebarAdminInitial">A</span>
          </div>
          <div class="min-w-0 flex-1">
            <div id="sidebarAdminName" class="truncate text-sm font-black text-white">Admin</div>
            <div id="sidebarAdminRole" class="text-[11px] font-bold uppercase tracking-wide text-indigo-300">Loading…</div>
          </div>
        </div>

        <!-- Logout button -->
        <button
          onclick="logout()"
          class="flex w-full items-center justify-center gap-2.5 rounded-xl bg-red-600/15 px-4 py-3 text-sm font-extrabold text-red-400 ring-1 ring-inset ring-red-500/30 transition hover:bg-red-600 hover:text-white hover:ring-red-600"
        >
          <svg class="h-4 w-4 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-8">

      <!-- Header -->
      <div class="mb-6 flex flex-col gap-4 rounded-3xl border border-slate-200 bg-white/80 p-5 shadow-lg backdrop-blur md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-3xl font-black text-slate-900">Room Management</h1>
          <p class="mt-1 font-semibold text-slate-500">Add, edit, and manage meeting rooms</p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <span id="roomsViewOnlyBadge" class="hidden rounded-full border border-amber-200 bg-amber-50 px-3 py-2 text-xs font-black text-amber-700">View Only</span>
          <button
            id="addRoomBtn"
            onclick="openRoomModal()"
            class="inline-flex min-h-10 items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-extrabold text-white shadow-md transition hover:bg-indigo-700"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Add Room
          </button>
        </div>
      </div>

      <div id="roomMessage" style="display:none;"></div>

      <!-- Room Cards -->
      <div id="roomCards" class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>

      <!-- ── Add / Edit Room Modal ──────────────────────────────────────────────── -->
      <div id="roomModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl">
          <h2 id="formTitle" class="mb-4 text-xl font-black text-slate-900">
            Add New Room
          </h2>

          <div id="roomModalMsg" class="mb-4 hidden rounded-xl px-4 py-3 font-bold text-sm"></div>

          <div class="mb-4 rounded-xl border border-indigo-100 bg-indigo-50 px-4 py-3 text-sm font-semibold text-slate-600">
            Add rooms that users and admins can book. Inactive rooms will not appear on the public booking calendar.
          </div>

          <form id="roomForm" class="grid gap-4">
            <input type="hidden" id="roomId" />

            <label class="block text-sm font-bold text-slate-700">
              Room Name
              <input
                type="text"
                id="roomName"
                required
                placeholder="Example: Meeting Room 01"
                class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              />
            </label>

            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <label class="block text-sm font-bold text-slate-700">
                Capacity
                <input
                  type="number"
                  id="capacity"
                  min="1"
                  required
                  placeholder="Example: 10"
                  class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
                />
              </label>

              <label class="block text-sm font-bold text-slate-700">
                Location
                <input
                  type="text"
                  id="location"
                  required
                  placeholder="Example: Level 2"
                  class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
                />
              </label>
            </div>

            <label class="block text-sm font-bold text-slate-700">
              Status
              <select
                id="roomStatus"
                class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
              >
                <option>Active</option>
                <option>Inactive</option>
              </select>
            </label>

            <div class="flex gap-3 pt-2">
              <button
                type="button"
                onclick="closeRoomModal()"
                class="flex-1 rounded-xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-600 transition hover:bg-slate-50"
              >
                Cancel
              </button>

              <button
                type="submit"
                id="roomSubmitBtn"
                class="flex-1 rounded-xl bg-indigo-600 px-4 py-3 text-sm font-extrabold text-white transition hover:bg-indigo-700"
              >
                Save Room
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="sidebar-extras.js"></script>
  <script>
    requireAuth();

    // General admins have view-only access — hide the Add Room action,
    // they can still see room cards but Edit/Delete are gated in renderRooms().
    if (!isSuperAdmin()) {
      document.getElementById('addRoomBtn').classList.add('hidden');
      document.getElementById('roomsViewOnlyBadge').classList.remove('hidden');
    }

    let roomCache = [];

    function resetRoomForm() {
      document.getElementById('roomId').value = '';
      document.getElementById('roomForm').reset();
      document.getElementById('formTitle').textContent = 'Add New Room';
      document.getElementById('roomSubmitBtn').textContent = 'Save Room';
    }

    function openRoomModal() {
      resetRoomForm();
      clearModalMsg('roomModalMsg');
      showModal('roomModal');
    }

    function closeRoomModal() {
      hideModal('roomModal');
    }

    document.getElementById('roomModal').addEventListener('click', function(e) {
      if (e.target === this) closeRoomModal();
    });

    async function renderRooms() {
      roomCache = await getRooms();

      document.getElementById('roomCards').innerHTML = roomCache.map(function(room) {
        const isActive = room.status === 'Active';

        const actionRail = isSuperAdmin() ? `
          <div class="flex w-14 shrink-0 flex-col items-center justify-center gap-1.5 border-r border-slate-100 bg-slate-50/70 py-4">
            ${iconButton('edit', `editRoom(${room.id})`, 'Edit room', 'indigo')}
            ${iconButton('trash', `removeRoom(${room.id})`, 'Delete room', 'red')}
          </div>
        ` : `
          <div class="w-1.5 shrink-0 ${isActive ? 'bg-emerald-400' : 'bg-slate-300'}"></div>
        `;

        return `
          <div class="group flex overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-md transition hover:-translate-y-0.5 hover:shadow-xl">
            ${actionRail}

            <div class="flex-1 p-5">
              <div class="flex items-start justify-between gap-3">
                <h3 class="text-lg font-black leading-tight text-slate-900">
                  ${escapeHtml(room.name)}
                </h3>
                ${formatStatus(room.status)}
              </div>

              <div class="mt-3 space-y-2 text-sm font-semibold text-slate-500">
                <div class="flex items-center gap-2">
                  <svg class="h-4 w-4 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                  ${room.capacity} seats
                </div>
                <div class="flex items-center gap-2">
                  <svg class="h-4 w-4 shrink-0 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                  ${escapeHtml(room.location)}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('') || `
        <div class="col-span-full flex flex-col items-center justify-center rounded-3xl border-2 border-dashed border-slate-200 bg-white/60 p-12 text-center">
          <div class="mb-3 flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-100 text-slate-400">
            <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4" />
            </svg>
          </div>
          <p class="font-bold text-slate-600">No rooms found</p>
          <p class="mt-1 text-sm font-semibold text-slate-400">Get started by adding your first meeting room.</p>
        </div>
      `;
    }

    function editRoom(id) {
      const room = roomCache.find(function(x) {
        return Number(x.id) === Number(id);
      });

      if (!room) return;

      document.getElementById('roomId').value = room.id;
      document.getElementById('roomName').value = room.name;
      document.getElementById('capacity').value = room.capacity;
      document.getElementById('location').value = room.location;
      document.getElementById('roomStatus').value = room.status;
      document.getElementById('formTitle').textContent = 'Edit Room';
      document.getElementById('roomSubmitBtn').textContent = 'Update Room';

      clearModalMsg('roomModalMsg');
      showModal('roomModal');
    }

    function removeRoom(id) {
      confirmAction('This room will be permanently deleted. This cannot be undone.', async function () {
        try {
          await deleteRoomApi(id);
          showMessage('roomMessage', 'Room deleted successfully.');
          await renderRooms();
        } catch (err) {
          showMessage('roomMessage', err.message, 'error');
        }
      }, { title: 'Delete Room?', confirmLabel: 'Delete' });
    }

    document.getElementById('roomForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearModalMsg('roomModalMsg');

      const payload = {
        name: document.getElementById('roomName').value.trim(),
        capacity: Number(document.getElementById('capacity').value),
        location: document.getElementById('location').value.trim(),
        status: document.getElementById('roomStatus').value
      };

      try {
        const id = document.getElementById('roomId').value;

        if (id) {
          await updateRoom(id, payload);
        } else {
          await createRoom(payload);
        }

        closeRoomModal();
        showMessage('roomMessage', 'Room saved successfully.');
        await renderRooms();
      } catch (err) {
        showModalMsg('roomModalMsg', err.message);
      }
    });

    renderRooms().catch(function(err) {
      showMessage('roomMessage', err.message, 'error');
    });
  </script>
</body>
</html>
