<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History - SmartBook</title>

  <!-- Browser Tab Logo -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="auth-guard.js"></script>
</head>

<body class="admin-page min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 text-slate-800 antialiased">
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside id="adminSidebar" class="relative sticky top-0 flex h-screen w-60 shrink-0 flex-col bg-gradient-to-br from-indigo-950 via-slate-950 to-slate-900 p-5 text-white shadow-2xl transition-[width] duration-200">
      <div class="mb-5">
        <div id="sidebarLogoCard" class="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/10 p-3">
          <img
            src="./images/logo.png"
            alt="SmartBook Logo"
            class="h-11 w-11 shrink-0 rounded-xl bg-white p-1.5 object-contain"
            onerror="this.onerror=null;this.src='images/logo.png';"
          />
          <div class="sidebar-label min-w-0">
            <div class="text-lg font-black leading-tight text-white">Smart<span class="text-violet-400">Book</span></div>
            <div class="mt-1 text-[11px] font-bold uppercase tracking-wider text-indigo-200">
              Admin Panel
            </div>
          </div>
        </div>
      </div>

      <button
        id="sidebarToggleBtn"
        onclick="toggleSidebar()"
        title="Collapse sidebar"
        aria-label="Collapse sidebar"
        class="absolute -right-3.5 top-9 z-10 flex h-7 w-7 items-center justify-center rounded-full border border-white/10 bg-indigo-950 text-indigo-200 shadow-lg transition hover:bg-indigo-800 hover:text-white"
      >
        <svg id="sidebarToggleIcon" class="h-4 w-4 shrink-0 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      <nav class="space-y-2 overflow-y-auto">
        <a class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="dashboard.html" title="Dashboard">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
          <span class="sidebar-label">Dashboard</span>
        </a>
        <a class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="rooms.html" title="Rooms">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4" /></svg>
          <span class="sidebar-label">Rooms</span>
        </a>
        <a class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="book-room.html" title="Book Room">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
          <span class="sidebar-label">Book Room</span>
        </a>
        <a class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="users.html" title="Users">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          <span class="sidebar-label">Users</span>
        </a>
        <a class="sidebar-link flex items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="bookings.html" title="Bookings">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          <span class="sidebar-label">Bookings</span>
        </a>
        <a class="sidebar-link flex items-center gap-3 rounded-xl bg-indigo-600 px-4 py-3 font-bold text-white shadow-lg" href="history.html" title="History">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <span class="sidebar-label">History</span>
        </a>
        <a id="adminsNavLink" class="sidebar-link hidden items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="admins.html" title="Admins">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 11V7a4 4 0 118 0v4M5 11h14v9H5v-9z" /></svg>
          <span class="sidebar-label">Admins</span>
        </a>
      </nav>

      <div class="mt-auto">
        <div class="my-4 border-t border-white/10"></div>

        <!-- Signed-in admin info -->
        <div id="sidebarAdminRow" class="mb-3 flex items-center gap-2.5 rounded-xl bg-white/5 px-3 py-2.5">
          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-indigo-500/40 text-sm font-black text-white">
            <span id="sidebarAdminInitial">A</span>
          </div>
          <div class="sidebar-label min-w-0 flex-1">
            <div id="sidebarAdminName" class="truncate text-sm font-black text-white">Admin</div>
            <div id="sidebarAdminRole" class="text-[11px] font-bold uppercase tracking-wide text-indigo-300">Loading…</div>
          </div>
        </div>

        <!-- Logout button -->
        <button
          onclick="logout()"
          class="flex w-full items-center justify-center gap-2.5 rounded-xl bg-red-600/15 px-4 py-3 text-sm font-extrabold text-red-400 ring-1 ring-inset ring-red-500/30 transition hover:bg-red-600 hover:text-white hover:ring-red-600"
        >
          <svg class="h-4 w-4 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span class="sidebar-label">Sign Out</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-8">

      <!-- Header -->
      <div class="mb-6 flex flex-col gap-4 rounded-3xl border border-slate-200 bg-white/80 p-5 shadow-lg backdrop-blur md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-3xl font-black text-slate-900">
            Booking History
          </h1>
        </div>

        <div class="flex flex-wrap items-center gap-3">
          <button
            onclick="location.href='bookings.html'"
            class="inline-flex min-h-10 items-center justify-center rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-extrabold text-white shadow-md transition hover:bg-indigo-700"
          >
            Active Bookings
          </button>

          <button
            onclick="location.href='book-room.html'"
            class="inline-flex min-h-10 items-center justify-center rounded-xl border border-slate-300 bg-slate-100 px-4 py-2.5 text-sm font-extrabold text-slate-700 transition hover:bg-slate-200"
          >
            New Booking
          </button>
        </div>
      </div>

      <div id="historyMessage" style="display:none;"></div>

      <!-- Filters -->
      <section class="mb-5 rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
        <div class="grid grid-cols-1 gap-5 md:grid-cols-3">

          <div>
            <label class="mb-2 block text-sm font-bold text-slate-600">
              Filter by Room
            </label>

            <select
              id="historyRoomFilter"
              onchange="renderHistory()"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            >
              <option value="">All rooms</option>
            </select>
          </div>

          <div>
            <label class="mb-2 block text-sm font-bold text-slate-600">
              Filter by Date
            </label>

            <input
              type="date"
              id="historyDateFilter"
              onchange="renderHistory()"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            />
          </div>

          <div>
            <label class="mb-2 block text-sm font-bold text-slate-600">
              History Type
            </label>

            <select
              id="historyStatusFilter"
              onchange="renderHistory()"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            >
              <option value="">Completed and Cancelled</option>
              <option value="Completed">Completed only</option>
              <option value="Cancelled">Cancelled only</option>
            </select>
          </div>

        </div>
      </section>

      <!-- Stats -->
      <section class="mb-5 grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3">

        <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
          <div class="mb-3 flex h-11 w-11 items-center justify-center rounded-2xl bg-indigo-50 font-black text-indigo-600">
            H
          </div>

          <div class="text-xs font-black uppercase tracking-widest text-slate-500">
            History Items
          </div>

          <div id="historyTotal" class="my-2 text-4xl font-black text-slate-900">
            0
          </div>

          <div class="text-sm text-slate-500">
            Completed + cancelled
          </div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
          <div class="mb-3 flex h-11 w-11 items-center justify-center rounded-2xl bg-emerald-50 font-black text-emerald-600">
            C
          </div>

          <div class="text-xs font-black uppercase tracking-widest text-slate-500">
            Completed
          </div>

          <div id="completedTotal" class="my-2 text-4xl font-black text-slate-900">
            0
          </div>

          <div class="text-sm text-slate-500">
            Finished meetings
          </div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
          <div class="mb-3 flex h-11 w-11 items-center justify-center rounded-2xl bg-red-50 font-black text-red-600">
            X
          </div>

          <div class="text-xs font-black uppercase tracking-widest text-slate-500">
            Cancelled
          </div>

          <div id="cancelledTotal" class="my-2 text-4xl font-black text-slate-900">
            0
          </div>

          <div class="text-sm text-slate-500">
            Cancelled meetings
          </div>
        </div>

      </section>

      <!-- History Table -->
      <section class="rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
        <div class="overflow-x-auto rounded-2xl border border-slate-200">

          <table class="w-full border-collapse bg-white">
            <thead>
              <tr>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">
                  Booked By
                </th>

                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">
                  Email
                </th>

                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">
                  Date
                </th>

                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">
                  Time
                </th>

                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">
                  Details
                </th>

                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">
                  Status
                </th>
              </tr>
            </thead>

            <tbody id="historyRows"></tbody>
          </table>

        </div>
      </section>

      <!-- ── Booking Details Modal ──────────────────────────────────────────────── -->
      <div id="bookingDetailsModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/30 backdrop-blur-md p-4">
        <div class="w-full max-w-md rounded-3xl border border-white/60 bg-white/75 p-6 shadow-2xl backdrop-blur-xl">
          <h2 class="mb-4 text-xl font-black text-slate-900">Booking Details</h2>

          <div class="space-y-4">
            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Room</label>
              <p id="detailsRoom" class="font-bold text-slate-800"></p>
            </div>

            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Purpose</label>
              <p id="detailsPurpose" class="font-bold text-slate-800"></p>
            </div>

            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Agenda</label>
              <p id="detailsAgenda" class="whitespace-pre-wrap text-sm font-semibold text-slate-600"></p>
            </div>

            <div>
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Participants</label>
              <p id="detailsParticipants" class="text-sm font-semibold text-slate-600"></p>
            </div>

            <div id="detailsMinutesRow" class="hidden">
              <label class="mb-1 block text-xs font-extrabold uppercase tracking-wider text-slate-500">Minutes of Meeting</label>
              <p id="detailsMinutes" class="whitespace-pre-wrap text-sm font-semibold text-slate-600"></p>
            </div>
          </div>

          <button
            type="button"
            onclick="closeBookingDetailsModal()"
            class="mt-6 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm font-bold text-slate-600 transition hover:bg-slate-50"
          >
            Close
          </button>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
  <script src="sidebar-extras.js"></script>

  <script>
    requireAuth();

    let historyRoomsCache = [];
    let historyBookingsCache = [];
    let historyRowsCache = [];

    function fillHistoryRoomFilter(rooms) {
      const select = document.getElementById('historyRoomFilter');

      if (!select) return;

      const selected = select.value;

      select.innerHTML =
        '<option value="">All rooms</option>' +
        rooms.map(function(room) {
          return '<option value="' + room.id + '">' +
            escapeHtml(room.name) + ' - ' + escapeHtml(room.location) +
          '</option>';
        }).join('');

      select.value = selected;
    }

    async function loadHistoryData() {
      const results = await Promise.all([
        getRooms(),
        getBookings()
      ]);

      historyRoomsCache = results[0] || [];
      historyBookingsCache = results[1] || [];

      fillHistoryRoomFilter(historyRoomsCache);

      renderHistory();
    }

    function isHistoryStatus(status) {
      return status === 'Completed' || status === 'Cancelled';
    }

    function renderHistory() {
      const roomFilter =
        document.getElementById('historyRoomFilter')?.value || '';

      const dateFilter =
        document.getElementById('historyDateFilter')?.value || '';

      const statusFilter =
        document.getElementById('historyStatusFilter')?.value || '';

      let rows = historyBookingsCache
        .filter(function(booking) {
          return isHistoryStatus(booking.status);
        });

      if (roomFilter) {
        rows = rows.filter(function(booking) {
          return Number(booking.roomId) === Number(roomFilter);
        });
      }

      if (dateFilter) {
        rows = rows.filter(function(booking) {
          return booking.date === dateFilter;
        });
      }

      if (statusFilter) {
        rows = rows.filter(function(booking) {
          return booking.status === statusFilter;
        });
      }

      rows.sort(function(a, b) {
        if (a.date !== b.date) {
          return b.date.localeCompare(a.date);
        }

        return bookingStartMinutes(b) - bookingStartMinutes(a);
      });

      historyRowsCache = rows;

      document.getElementById('historyTotal').textContent = rows.length;

      document.getElementById('completedTotal').textContent =
        rows.filter(function(booking) {
          return booking.status === 'Completed';
        }).length;

      document.getElementById('cancelledTotal').textContent =
        rows.filter(function(booking) {
          return booking.status === 'Cancelled';
        }).length;

      document.getElementById('historyRows').innerHTML =
        rows.map(function(booking) {
          return `
            <tr>
              <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
                ${escapeHtml(booking.user)}
              </td>

              <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
                ${escapeHtml(booking.email)}
              </td>

              <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
                ${escapeHtml(formatDateDisplay(booking.date))}
              </td>

              <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
                ${escapeHtml(booking.startTime || formatTime12(booking.start))}
                -
                ${escapeHtml(booking.endTime || formatTime12(booking.end))}
              </td>

              <td class="border-b border-slate-100 px-4 py-3 align-middle">
                ${iconButton('eye', `viewBookingDetails(${booking.id})`, 'View room, purpose, agenda, and participants', 'indigo')}
              </td>

              <td class="border-b border-slate-100 px-4 py-3 align-middle">
                ${formatStatus(booking.status)}
              </td>
            </tr>
          `;
        }).join('') || `
          <tr>
            <td colspan="6" class="py-6 text-center font-semibold text-slate-500">
              No completed or cancelled meetings found.
            </td>
          </tr>
        `;
    }

    function viewBookingDetails(id) {
      const booking = historyRowsCache.find(function(b) {
        return Number(b.id) === Number(id);
      });

      if (!booking) return;

      document.getElementById('detailsRoom').textContent = booking.roomName +
        (booking.location ? ' — ' + booking.location : '');
      document.getElementById('detailsPurpose').textContent = booking.purpose || '—';
      document.getElementById('detailsAgenda').textContent = booking.agenda || 'No agenda provided.';
      document.getElementById('detailsParticipants').textContent = booking.participants || 'No participants listed.';

      const minutesRow = document.getElementById('detailsMinutesRow');
      if (booking.minutesOfMeeting) {
        document.getElementById('detailsMinutes').textContent = booking.minutesOfMeeting;
        minutesRow.classList.remove('hidden');
      } else {
        minutesRow.classList.add('hidden');
      }

      showModal('bookingDetailsModal');
    }

    function closeBookingDetailsModal() {
      hideModal('bookingDetailsModal');
    }

    document.getElementById('bookingDetailsModal').addEventListener('click', function(e) {
      if (e.target === this) closeBookingDetailsModal();
    });

    loadHistoryData().catch(function(err) {
      showMessage('historyMessage', err.message, 'error');
    });

    setInterval(loadHistoryData, 10000);
  </script>
</body>
</html>
