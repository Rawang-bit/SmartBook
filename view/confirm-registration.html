<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Your Account - SmartBook</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="relative min-h-screen overflow-hidden">

  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat blur-sm scale-105"
       style="background-image: url('images/background.png');"></div>
  <div class="absolute inset-0 bg-black/50"></div>

  <div class="relative min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md rounded-3xl bg-white shadow-[0_32px_64px_-12px_rgba(0,0,0,0.35)] overflow-hidden">

      <!-- Top accent bar -->
      <div class="h-1.5 w-full bg-gradient-to-r from-indigo-500 via-violet-500 to-indigo-600"></div>

      <div class="px-10 pt-8 pb-10">

        <div class="flex justify-center mb-6">
          <img src="images/logo.png" alt="SmartBook Logo" class="h-20 w-auto max-w-[200px] object-contain drop-shadow-sm" />
        </div>

        <!-- ─── Pending confirmation ───────────────────────────────────────────── -->
        <div id="pendingStep">
          <div class="text-center mb-8">
            <p class="text-sm font-semibold tracking-widest text-slate-400 uppercase mb-1">Account Activation</p>
            <h1 class="text-4xl font-black tracking-tight">Smart<span class="text-indigo-600">Book</span></h1>
            <p class="mt-2 text-sm text-slate-500 font-medium">An administrator has added you to SmartBook. Click below to confirm your email and activate your account.</p>
          </div>

          <div id="confirmMsg" class="mb-4 hidden rounded-xl px-4 py-3 font-bold text-sm"></div>

          <button id="confirmBtn"
            class="w-full rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 py-3.5 font-black text-white shadow-lg shadow-indigo-200 transition hover:from-indigo-700 hover:to-violet-700 active:scale-[0.98]">
            Confirm &amp; Activate Account
          </button>
        </div>

        <!-- ─── No token in URL ────────────────────────────────────────────────── -->
        <div id="noTokenStep" class="hidden text-center">
          <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-red-50 text-red-500">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </div>
          <p class="text-sm font-semibold tracking-widest text-slate-400 uppercase mb-1">Invalid Link</p>
          <h1 class="text-4xl font-black tracking-tight mb-3">Smart<span class="text-indigo-600">Book</span></h1>
          <p class="text-sm text-slate-500 font-medium">This confirmation link is missing its token. Please use the exact link from your email, or ask an admin to add you again.</p>
        </div>

      </div><!-- /px-10 content wrapper -->
    </div><!-- /card -->
  </div>

  <script>
    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function showMsg(text, type) {
      const el = document.getElementById('confirmMsg');
      el.className = `mb-4 rounded-xl px-4 py-3 font-bold text-sm ${
        type === 'success'
          ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
          : 'bg-red-50 text-red-700 border border-red-200'
      }`;
      el.textContent = text;
      el.classList.remove('hidden');
    }

    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('pendingStep').classList.add('hidden');
      document.getElementById('noTokenStep').classList.remove('hidden');
    } else {
      document.getElementById('confirmBtn').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        btn.textContent = 'Confirming…';

        try {
          const res = await api('/api/users/confirm', {
            method: 'POST',
            body: JSON.stringify({ token }),
          });
          showMsg(res.message, 'success');
          btn.textContent = 'Confirmed ✓';

          setTimeout(() => {
            window.location.href = res.role === 'normal_user' ? 'index.html' : 'login.html';
          }, 2000);
        } catch (err) {
          showMsg(err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Confirm & Activate Account';
        }
      });
    }
  </script>
</body>
</html>
