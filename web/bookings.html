<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings - SmartBook</title>

  <!-- Browser Tab Logo -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon_io/favicon-32x32.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth-guard.js"></script>
</head>

<body class="admin-page min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 text-slate-800 antialiased">
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="sticky top-0 flex h-screen w-60 shrink-0 flex-col bg-gradient-to-br from-indigo-950 via-slate-950 to-slate-900 p-5 text-white shadow-2xl">
      <div class="mb-7">
        <div class="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/10 p-3">
          <img
            src="./images/logo.png"
            alt="SmartBook Logo"
            class="h-11 w-11 shrink-0 rounded-xl bg-white p-1.5 object-contain"
            onerror="this.onerror=null;this.src='images/logo.png';"
          />
          <div>
            <div class="text-lg font-black leading-tight text-white">SmartBook</div>
            <div class="mt-1 text-[11px] font-bold uppercase tracking-wider text-indigo-200">
              Admin Panel
            </div>
          </div>
        </div>
      </div>

      <nav class="space-y-2">
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="dashboard.html">Dashboard</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="rooms.html">Rooms</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="book-room.html">Book Room</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="users.html">Users</a>
        <a class="block rounded-xl bg-indigo-600 px-4 py-3 font-bold text-white shadow-lg" href="bookings.html">Bookings</a>
        <a class="block rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="history.html">History</a>
        <a id="adminsNavLink" class="hidden rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-indigo-600 hover:text-white" href="admins.html">Admins</a>
      </nav>

      <div class="mt-auto space-y-1 border-t border-white/10 pt-4">
        <a href="#" onclick="openSharedCpModal()" class="flex items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-slate-700 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
          </svg>
          Change Password
        </a>
        <a href="#" onclick="logout()" class="flex items-center gap-3 rounded-xl px-4 py-3 font-bold text-slate-300 transition hover:translate-x-1 hover:bg-red-600 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-8">

      <!-- Header -->
      <div class="mb-6 flex flex-col gap-4 rounded-3xl border border-slate-200 bg-white/80 p-5 shadow-lg backdrop-blur md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-3xl font-black text-slate-900">Booking Management</h1>
          <p class="mt-1 font-semibold text-slate-500">View, filter, cancel, and delete room bookings</p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <span id="adminName" class="rounded-full border border-indigo-200 bg-indigo-50 px-3 py-2 text-xs font-black text-indigo-700">Admin</span>
          <button onclick="logout()" class="inline-flex min-h-10 items-center gap-2 rounded-xl bg-red-50 px-4 py-2.5 text-sm font-extrabold text-red-600 transition hover:bg-red-600 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Logout
          </button>
        </div>
      </div>

      <div id="bookingMessage" style="display:none;"></div>

      <!-- Filters -->
      <section class="mb-5 rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-bold text-slate-600">
              Filter by Room
            </label>
            <select
              id="bookingRoomFilter"
              onchange="renderBookings()"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            >
              <option value="">All rooms</option>
            </select>
          </div>

          <div>
            <label class="mb-2 block text-sm font-bold text-slate-600">
              Filter by Date
            </label>
            <input
              type="date"
              id="bookingDateFilter"
              onchange="renderBookings()"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500"
            />
          </div>
        </div>
      </section>

      <!-- Bookings Table -->
      <section class="rounded-3xl border border-slate-200 bg-white p-5 shadow-lg">
        <div class="overflow-x-auto rounded-2xl border border-slate-200">
          <table class="w-full border-collapse bg-white">
            <thead>
              <tr>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">User</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Email</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Room</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Date</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Time</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Purpose</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Status</th>
                <th class="bg-slate-50 px-4 py-3 text-left text-xs font-black uppercase tracking-wider text-slate-500">Action</th>
              </tr>
            </thead>
            <tbody id="bookingRows"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
  <script src="sidebar-extras.js"></script>
  <script>
    requireAuth();

    let allRoomsCache = [];

    function fillBookingRoomFilter(rooms) {
      const select = document.getElementById('bookingRoomFilter');
      const selected = select.value;

      let html = '<option value="">All rooms</option>';

      rooms.forEach(function(room) {
        html += '<option value="' + room.id + '">' +
          escapeHtml(room.name) + ' - ' + escapeHtml(room.location) +
        '</option>';
      });

      select.innerHTML = html;
      select.value = selected;
    }

    function getBookingSortDateTime(booking) {
      const startValue = booking.startTime || formatTime12(booking.start);
      return new Date(booking.date + 'T' + toTime24(startValue));
    }

    async function renderBookings() {
      const results = await Promise.all([getRooms(), getBookings()]);
      allRoomsCache = results[0];

      const allBookings = results[1];
      fillBookingRoomFilter(allRoomsCache);

      const roomFilter = document.getElementById('bookingRoomFilter').value;
      const dateFilter = document.getElementById('bookingDateFilter').value;

      const bookings = allBookings
        .filter(function(booking) {
          const roomOk = !roomFilter || Number(booking.roomId) === Number(roomFilter);
          const dateOk = !dateFilter || booking.date === dateFilter;

          return roomOk && dateOk;
        })
        .sort(function(a, b) {
          return getBookingSortDateTime(b) - getBookingSortDateTime(a);
        });

      document.getElementById('bookingRows').innerHTML = bookings.map(function(booking) {
        const canCancel = booking.status !== 'Cancelled' && booking.status !== 'Completed';

        return `
          <tr class="transition hover:bg-slate-50">
            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.user)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.email)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.roomName)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(formatDateDisplay(booking.date))}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.startTime || formatTime12(booking.start))}
              -
              ${escapeHtml(booking.endTime || formatTime12(booking.end))}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle text-slate-700">
              ${escapeHtml(booking.purpose)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle">
              ${formatStatus(booking.status)}
            </td>

            <td class="border-b border-slate-100 px-4 py-3 align-middle">
              <div class="flex flex-wrap gap-2">
                ${isSuperAdmin() && canCancel
                    ? `<button
                        onclick="cancelBooking(${booking.id})"
                        class="inline-flex min-h-10 items-center justify-center rounded-xl bg-red-600 px-4 py-2.5 text-sm font-extrabold text-white shadow-md transition hover:bg-red-700"
                      >Cancel</button>`
                    : ''
                }
                ${isSuperAdmin()
                    ? `<button
                        onclick="hardDelete(${booking.id})"
                        class="inline-flex min-h-10 items-center justify-center rounded-xl border border-slate-300 bg-slate-100 px-4 py-2.5 text-sm font-extrabold text-slate-700 transition hover:bg-slate-200"
                      >Delete</button>`
                    : (!canCancel ? '' : '<span class="text-xs font-semibold text-slate-400">View only</span>')
                }
              </div>
            </td>
          </tr>
        `;
      }).join('') || `
        <tr>
          <td colspan="8" class="px-4 py-6 text-center font-semibold text-slate-500">
            No bookings found.
          </td>
        </tr>
      `;
    }

    async function cancelBooking(id) {
      if (!confirm('Cancel this booking?')) return;

      try {
        await cancelBookingApi(id);
        showMessage('bookingMessage', 'Booking cancelled successfully.');
        await renderBookings();
      } catch (err) {
        showMessage('bookingMessage', err.message, 'error');
      }
    }

    async function hardDelete(id) {
      if (!confirm('Delete this booking permanently?')) return;

      try {
        await deleteBookingApi(id);
        showMessage('bookingMessage', 'Booking deleted successfully.');
        await renderBookings();
      } catch (err) {
        showMessage('bookingMessage', err.message, 'error');
      }
    }

    renderBookings().catch(function(err) {
      showMessage('bookingMessage', err.message, 'error');
    });

    setInterval(renderBookings, 10000);
  </script>
</body>
</html>
